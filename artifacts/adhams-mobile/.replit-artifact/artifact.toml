kind = "mobile"
previewPath = "/mobile/"
title = "Adhams Mobile"
version = "1.0.0"
id = "artifacts/adhams-mobile"
router = "expo-domain"

[[integratedSkills]]
name = "expo"
version = "1.0.0"

[[services]]
ensurePreviewReachable = "/status"
name = "expo"
paths = [ "/mobile/" ]
localPort = 25243

[services.development]
run = "pnpm --filter @workspace/adhams-mobile run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/adhams-mobile", "run", "build" ]
run = [ "pnpm", "--filter", "@workspace/adhams-mobile", "run", "serve" ]

[services.env]
PORT = "25243"
BASE_PATH = "/mobile/"
